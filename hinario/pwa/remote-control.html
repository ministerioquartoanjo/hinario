<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Controle Remoto - Hinário MQAAF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #0c0a09;
        }

        .grid-button {
            @apply bg-gray-800 hover:bg-orange-dark text-white p-6 rounded-2xl flex flex-col items-center justify-center gap-3 transition-all active:scale-95 shadow-lg;
        }
    </style>
</head>

<body class="text-white font-sans flex flex-col h-screen">
    <header class="p-6 bg-gray-900 border-b border-gray-800 flex items-center justify-between">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <i class="fas fa-mobile-alt text-orange-dark"></i>
            Controle Remoto
        </h1>
        <div class="status-dot w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
    </header>

    <main class="flex-grow p-6 grid grid-cols-2 gap-4 overflow-y-auto">
        <!-- Navegação -->
        <button id="remote-prev" class="grid-button">
            <i class="fas fa-chevron-left text-2xl"></i>
            <span>Slide Anterior</span>
        </button>
        <button id="remote-next" class="grid-button">
            <i class="fas fa-chevron-right text-2xl"></i>
            <span>Próximo Slide</span>
        </button>

        <!-- Hinos -->
        <button id="remote-prev-hino" class="grid-button">
            <i class="fas fa-step-backward text-2xl"></i>
            <span>Hino Anterior</span>
        </button>
        <button id="remote-next-hino" class="grid-button">
            <i class="fas fa-step-forward text-2xl"></i>
            <span>Próximo Hino</span>
        </button>

        <!-- Áudio -->
        <button id="remote-play" class="grid-button col-span-2 bg-orange-dark">
            <i class="fas fa-play text-3xl"></i>
            <span>Play / Pause</span>
        </button>

        <button id="remote-stop" class="grid-button">
            <i class="fas fa-stop text-2xl text-red-400"></i>
            <span>Parar Áudio</span>
        </button>
        <button id="remote-fullscreen" class="grid-button">
            <i class="fas fa-expand text-2xl text-blue-400"></i>
            <span>Tela Cheia</span>
        </button>

        <!-- Visual -->
        <button id="remote-toggle-bg" class="grid-button">
            <i class="fas fa-image text-2xl text-green-400"></i>
            <span>Alternar Fundo</span>
        </button>
        <button id="remote-toggle-complete" class="grid-button">
            <i class="fas fa-align-left text-2xl text-yellow-400"></i>
            <span>Modo Completo</span>
        </button>
    </main>

    <footer class="p-6 bg-gray-900 flex flex-col items-center gap-2">
        <p class="text-xs text-gray-500">Conectado ao dispositivo principal</p>
        <button onclick="window.close()" class="text-sm text-gray-400 underline">Fechar Controle</button>
    </footer>

    <script shadow>
        // Sincronização simples via BroadcastChannel
        const bc = new BroadcastChannel('hinario_remote');

        const send = (action) => {
            bc.postMessage({ action });
            // Haptic feedback se disponível
            if (navigator.vibrate) navigator.vibrate(50);
        };

        document.getElementById('remote-prev').onclick = () => send('prevSlide');
        document.getElementById('remote-next').onclick = () => send('nextSlide');
        document.getElementById('remote-prev-hino').onclick = () => send('prevHino');
        document.getElementById('remote-next-hino').onclick = () => send('nextHino');
        document.getElementById('remote-play').onclick = () => send('togglePlay');
        document.getElementById('remote-stop').onclick = () => send('stopAudio');
        document.getElementById('remote-fullscreen').onclick = () => send('toggleFullscreen');
        document.getElementById('remote-toggle-bg').onclick = () => send('toggleBg');
        document.getElementById('remote-toggle-complete').onclick = () => send('toggleComplete');
    </script>
</body>

</html>
