<!DOCTYPE html>
<html lang="pt-BR" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Controle Remoto - Hinário MQAAF</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            background-color: #f9fafb;
        }

        .grid-button {
            background-color: #e5e7eb;
            color: #1f2937;
            padding: 0.25rem 0.375rem;
            border-radius: 0.25rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.1875rem;
            transition: all 0.3s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            font-size: 0.75rem;
            min-height: 1.75rem;
            border: none;
            cursor: pointer;
        }
        .grid-button:hover {
            background-color: #f97316;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(249, 115, 22, 0.3);
        }
        .grid-button:active {
            transform: translateY(0);
            box-shadow: 0 2px 4px rgba(249, 115, 22, 0.2);
        }
        .grid-button.invisible {
            visibility: hidden;
        }
        .speed-button {
            min-height: 1rem;
            padding: 0.25rem;
            font-size: 0.75rem;
            gap: 0;
            width: 2rem;
            flex: 0 0 auto;
            background-color: #e5e7eb;
            color: #1f2937;
            border-radius: 0.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            cursor: pointer;
            border: none;
        }
        .speed-button:hover {
            background-color: #f97316;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(249, 115, 22, 0.3);
        }
        .grid-button {
            min-height: 1.5rem !important;
            padding: 0.1875rem 0.25rem !important;
            font-size: 0.6875rem !important;
            gap: 0.125rem !important;
        }
        .gap-1 {
            gap: 0.25rem !important;
        }
        .bg-green-600 {
            background-color: rgb(34 197 94) !important;
        }
        .bg-gray-200 {
            background-color: rgb(229 231 235) !important;
        }
        .bg-orange-dark {
            background-color: rgb(249 115 22) !important;
        }
    </style>
</head>

<body class="text-gray-900 font-sans flex flex-col h-screen">
    <header class="px-3 py-2 bg-white border-b border-gray-200 flex items-center justify-between text-[10px] md:text-xs">
        <h1 class="text-xs md:text-sm font-semibold flex items-center gap-1">
            <i class="fas fa-mobile-alt text-orange-dark text-sm md:text-base"></i>
            Controle Remoto
            <span id="app-version" class="text-[9px] text-gray-500">v26.02.13.2</span>
        </h1>
        <div class="status-dot w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
    </header>

    <section class="px-3 py-2 bg-gray-50 border-b border-gray-200 space-y-2 text-[10px]">
        <label class="uppercase tracking-wide text-[10px] text-gray-600" for="remote-hino-number">Selecionar Hino</label>
        <div class="flex gap-2 items-center">
            <div class="relative flex-1">
                <input id="remote-hino-number" list="remote-hino-options" placeholder="Ex.: 120 - Título"
                    class="w-full bg-white border border-gray-300 rounded-lg pl-3 pr-8 py-1.5 text-xs focus:outline-none focus:border-orange-dark"
                    autocomplete="off">
                <button id="remote-clear-hino"
                    class="absolute right-2 top-1/2 -translate-y-1/2 text-gray-500 hover:text-red-400 text-xs"
                    title="Limpar seleção">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <button id="remote-select-hino"
                class="px-2.5 py-1.5 bg-orange-dark text-white text-xs rounded-lg font-semibold">Ir</button>
        </div>
        <datalist id="remote-hino-options"></datalist>
        <p id="remote-hino-feedback" class="text-[10px] text-gray-500">Informe o número e toque em “Ir”.</p>
    </section>

    <main class="flex-grow p-2 overflow-y-auto text-[10px]">
        <!-- Navigation Controls -->
        <div class="mb-3">
            <h3 class="text-[9px] text-gray-600 uppercase tracking-wide mb-1">Navegação</h3>
            <div class="grid grid-cols-4 gap-1">
                <button id="remote-prev" class="grid-button">
                    <i class="fas fa-chevron-left text-xs"></i>
                    <span>Ant</span>
                </button>
                <button id="remote-next" class="grid-button">
                    <i class="fas fa-chevron-right text-xs"></i>
                    <span>Próx</span>
                </button>
                <button id="remote-fullscreen" class="grid-button">
                    <i class="fas fa-expand text-xs text-blue-400"></i>
                    <span>Tela</span>
                </button>
                <button id="remote-home" class="grid-button">
                    <i class="fas fa-home text-xs text-orange-400"></i>
                    <span>Início</span>
                </button>
                <button id="remote-scroll-up" class="grid-button">
                    <i class="fas fa-arrow-up text-xs text-green-400"></i>
                    <span>Subir</span>
                </button>
                <button id="remote-scroll-down" class="grid-button">
                    <i class="fas fa-arrow-down text-xs text-green-400"></i>
                    <span>Descer</span>
                </button>
            </div>
        </div>

        <!-- Hymn Controls -->
        <div class="mb-3">
            <h3 class="text-[9px] text-gray-600 uppercase tracking-wide mb-1">Hinos</h3>
            <div class="grid grid-cols-4 gap-1">
                <button id="remote-prev-hino" class="grid-button">
                    <i class="fas fa-step-backward text-xs"></i>
                    <span>Ant</span>
                </button>
                <button id="remote-next-hino" class="grid-button">
                    <i class="fas fa-step-forward text-xs"></i>
                    <span>Próx</span>
                </button>
                <button id="remote-random-hino" class="grid-button">
                    <i class="fas fa-random text-xs text-purple-400"></i>
                    <span>Aleat</span>
                </button>
            </div>
        </div>

        <!-- Audio Controls -->
        <div class="mb-3">
            <h3 class="text-[9px] text-gray-600 uppercase tracking-wide mb-1">Áudio</h3>
            <div class="grid grid-cols-4 gap-1">
                <button id="remote-play" class="grid-button bg-orange-dark">
                    <i class="fas fa-pause text-xs"></i>
                    <span>Pausar</span>
                </button>
                <button id="remote-stop" class="grid-button">
                    <i class="fas fa-stop text-xs text-red-400"></i>
                    <span>Parar</span>
                </button>
                <button id="remote-restart" class="grid-button">
                    <i class="fas fa-redo text-xs text-yellow-400"></i>
                    <span>Reiniciar</span>
                </button>
                <button id="remote-equalizer" class="grid-button">
                    <i class="fas fa-sliders-h text-xs text-purple-400"></i>
                    <span>Equal</span>
                </button>
                <div class="col-span-2 flex items-center justify-center gap-1">
                    <button id="remote-speed-down" class="speed-button">
                        <i class="fas fa-backward text-xs text-blue-400"></i>
                    </button>
                    <div class="flex items-center justify-center text-xs text-gray-700 font-mono px-2">
                        <span id="remote-speed-display">1.0x</span>
                    </div>
                    <button id="remote-speed-up" class="speed-button">
                        <i class="fas fa-forward text-xs text-blue-400"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- Visual Controls -->
        <div class="mb-3">
            <h3 class="text-[9px] text-gray-600 uppercase tracking-wide mb-1">Visual</h3>
            <div class="grid grid-cols-2 gap-1">
                <button id="remote-toggle-bg" class="grid-button">
                    <i class="fas fa-image text-xs text-green-400"></i>
                    <span>Fundo</span>
                </button>
                <button id="remote-random-bg" class="grid-button">
                    <i class="fas fa-palette text-xs text-blue-300"></i>
                    <span>Fundo Aleatório</span>
                </button>
                <button id="remote-toggle-complete" class="grid-button">
                    <i class="fas fa-align-left text-xs text-yellow-400"></i>
                    <span>Completo</span>
                </button>
                <button id="remote-random-playlist" class="grid-button bg-gray-900 border border-gray-800">
                    <i class="fas fa-random text-xs text-pink-400"></i>
                    <span>Playlist</span>
                </button>
            </div>
        </div>
    </main>

    <footer class="px-3 py-2 md:px-4 md:py-3 bg-white border-t border-gray-200 flex flex-col items-center gap-1 text-xs">
        <p class="text-[10px] text-gray-600 uppercase tracking-wide">Conectado ao dispositivo principal</p>
        <button onclick="window.close()" class="text-xs text-gray-500 underline">Fechar Controle</button>
    </footer>

    <!-- Audio Filters Modal -->
    <div id="remote-modal-audio-filters" class="fixed inset-0 z-50 glass-overlay flex items-center justify-center p-4 hidden">
        <div class="bg-gray-900 rounded-2xl shadow-2xl max-w-md w-full p-4 relative border border-gray-800">
            <button class="btn-close-modal absolute top-2 right-2 text-gray-400 hover:text-red-500" onclick="this.closest('.fixed').classList.add('hidden')">
                <i class="fas fa-times text-lg"></i>
            </button>
            <h2 class="text-lg font-bold mb-3 flex items-center text-white">
                <i class="fas fa-sliders-h mr-2 text-orange-dark"></i> Ajustes de Áudio
            </h2>
            <div class="space-y-4">
                <!-- Normalização / Gain -->
                <div class="space-y-2">
                    <div class="flex justify-between items-center">
                        <label class="text-xs font-medium text-gray-300">Normalização (Volume Extra)</label>
                        <span id="remote-label-gain" class="text-xs font-mono text-gray-400">1.0x</span>
                    </div>
                    <input type="range" id="remote-range-gain" min="0.5" max="2.5" step="0.1" value="1.0"
                        class="w-full h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-orange-dark">
                </div>

                <div class="h-[1px] bg-gray-700"></div>

                <!-- Equalizer -->
                <div class="space-y-3">
                    <h3 class="text-xs font-bold uppercase tracking-wider opacity-50 text-center text-gray-400">Equalizador</h3>

                    <div class="relative bg-gray-800 rounded-xl p-3 border border-gray-700">
                        <!-- Grid Lines Background -->
                        <div class="absolute inset-x-1 top-1 bottom-6 flex flex-col justify-between pointer-events-none opacity-20">
                            <div class="border-t border-gray-600 w-full"></div>
                            <div class="border-t border-gray-600 w-full"></div>
                            <div class="border-t border-orange-dark w-full opacity-50"></div>
                            <div class="border-t border-gray-600 w-full"></div>
                            <div class="border-t border-gray-600 w-full"></div>
                        </div>

                        <!-- Frequency Sliders (Horizontal like main app) -->
                        <div class="relative z-10 space-y-2">
                            <div class="flex justify-between items-center">
                                <label class="text-xs text-gray-400 w-12">60Hz</label>
                                <input type="range" id="remote-range-bass" min="-20" max="20" step="1" value="0"
                                    class="flex-1 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-orange-dark mx-2">
                                <span id="remote-label-bass" class="text-xs font-mono text-gray-500 w-8 text-right">0dB</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <label class="text-xs text-gray-400 w-12">1kHz</label>
                                <input type="range" id="remote-range-mid" min="-20" max="20" step="1" value="0"
                                    class="flex-1 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-orange-dark mx-2">
                                <span id="remote-label-mid" class="text-xs font-mono text-gray-500 w-8 text-right">0dB</span>
                            </div>
                            <div class="flex justify-between items-center">
                                <label class="text-xs text-gray-400 w-12">10kHz</label>
                                <input type="range" id="remote-range-treble" min="-20" max="20" step="1" value="0"
                                    class="flex-1 h-2 bg-gray-700 rounded-lg appearance-none cursor-pointer accent-orange-dark mx-2">
                                <span id="remote-label-treble" class="text-xs font-mono text-gray-500 w-8 text-right">0dB</span>
                            </div>
                        </div>
                    </div>

                <div class="flex gap-2 mt-3">
                    <button id="remote-reset-filters" class="flex-1 bg-gray-700 hover:bg-gray-600 text-white text-xs py-2 rounded-lg transition-colors">
                        <i class="fas fa-undo mr-1"></i> Resetar
                    </button>
                    <button id="remote-apply-filters" class="flex-1 bg-orange-dark hover:bg-orange-700 text-white text-xs py-2 rounded-lg transition-colors">
                        <i class="fas fa-check mr-1"></i> Aplicar
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script shadow>
        // Sincronização simples via BroadcastChannel
        const bc = new BroadcastChannel('hinario_remote');
        let isFullscreenActive = false;

        const send = (action, extra = {}) => {
            bc.postMessage({ action, source: 'remote', ...extra });
            // Haptic feedback se disponível
            if (navigator.vibrate) navigator.vibrate(50);
        };

        const fullscreenBtn = document.getElementById('remote-fullscreen');
        const fullscreenIcon = fullscreenBtn.querySelector('i');
        const fullscreenLabel = fullscreenBtn.querySelector('span');
        const fullscreenStatus = document.getElementById('remote-fs-status');
        const hinoInput = document.getElementById('remote-hino-number');
        const hinoFeedback = document.getElementById('remote-hino-feedback');
        const hinoOptions = document.getElementById('remote-hino-options');
        const hinoClearBtn = document.getElementById('remote-clear-hino');
        const playlistBtn = document.getElementById('remote-random-playlist');
        const playlistIcon = playlistBtn.querySelector('i');
        const playlistLabel = playlistBtn.querySelector('span');
        let isPlaylistActive = false;
        const bgBtn = document.getElementById('remote-toggle-bg');
        const bgIcon = bgBtn.querySelector('i');
        const bgLabel = bgBtn.querySelector('span');
        let isBgActive = false;
        const completeBtn = document.getElementById('remote-toggle-complete');
        const completeIcon = completeBtn.querySelector('i');
        const completeLabel = completeBtn.querySelector('span');
        let isCompleteActive = false;
        const playBtn = document.getElementById('remote-play');
        const playIcon = playBtn.querySelector('i');
        const playLabel = playBtn.querySelector('span');
        const stopBtn = document.getElementById('remote-stop');
        const stopIcon = stopBtn.querySelector('i');
        const stopLabel = stopBtn.querySelector('span');
        const speedDisplay = document.getElementById('remote-speed-display');
        let isPlaying = false;

        const updatePlayState = (playing) => {
            isPlaying = playing;
            playIcon.classList.toggle('fa-play', !playing);
            playIcon.classList.toggle('fa-pause', playing);
            playLabel.textContent = playing ? 'Pausar' : 'Play/Pause';
        };

        const updateAudioFilters = (filters) => {
            console.log('Received audio filters:', filters);
            if (filters.gain !== undefined) {
                document.getElementById('remote-range-gain').value = filters.gain;
                document.getElementById('remote-label-gain').textContent = filters.gain.toFixed(1) + 'x';
            }
            if (filters.bass !== undefined) {
                document.getElementById('remote-range-bass').value = filters.bass;
                document.getElementById('remote-label-bass').textContent = filters.bass + 'dB';
            }
            if (filters.mid !== undefined) {
                document.getElementById('remote-range-mid').value = filters.mid;
                document.getElementById('remote-label-mid').textContent = filters.mid + 'dB';
            }
            if (filters.treble !== undefined) {
                document.getElementById('remote-range-treble').value = filters.treble;
                document.getElementById('remote-label-treble').textContent = filters.treble + 'dB';
            }
        };

        const updateBackgroundState = (active) => {
            console.log('Updating background state to:', active);
            isBgActive = active;
            if (active) {
                bgBtn.style.backgroundColor = 'rgb(34 197 94)';
                bgBtn.classList.remove('bg-gray-200');
                bgBtn.classList.add('bg-green-600');
            } else {
                bgBtn.style.backgroundColor = 'rgb(229 231 235)';
                bgBtn.classList.remove('bg-green-600');
                bgBtn.classList.add('bg-gray-200');
            }
            bgLabel.textContent = active ? 'Fundo ON' : 'Fundo';
        };

        const updateCompleteState = (active) => {
            console.log('Updating complete state to:', active);
            isCompleteActive = active;
            if (active) {
                completeBtn.style.backgroundColor = 'rgb(249 115 22)';
                completeBtn.classList.remove('bg-gray-200');
                completeBtn.classList.add('bg-orange-dark');
            } else {
                completeBtn.style.backgroundColor = 'rgb(229 231 235)';
                completeBtn.classList.remove('bg-orange-dark');
                completeBtn.classList.add('bg-gray-200');
            }
            completeLabel.textContent = active ? 'Completo ON' : 'Completo';
        };

        const updatePlaylistState = (active) => {
            isPlaylistActive = active;
            playlistIcon.classList.toggle('fa-random', !active);
            playlistIcon.classList.toggle('fa-stop', active);
            playlistLabel.textContent = active ? 'Parar Playlist' : 'Playlist';
            playlistBtn.classList.toggle('bg-green-600', active);
            playlistBtn.classList.toggle('bg-gray-900', !active);
        };

        const updateFullscreenState = (active) => {
            isFullscreenActive = active;
            fullscreenIcon.classList.toggle('fa-expand', !active);
            fullscreenIcon.classList.toggle('fa-compress', active);
            fullscreenLabel.textContent = active ? 'Sair da Tela Cheia' : 'Entrar em Tela Cheia';
            fullscreenStatus.textContent = active ? 'Modo Tela Cheia' : 'Tela Normal';
            fullscreenStatus.classList.toggle('text-green-400', active);
            fullscreenStatus.classList.toggle('text-gray-400', !active);
        };

        bc.onmessage = (event) => {
            const { action, value, source } = event.data || {};
            if (source === 'main') {
                if (action === 'fullscreenState') {
                    updateFullscreenState(Boolean(value));
                } else if (action === 'playlistState') {
                    updatePlaylistState(Boolean(value));
                } else if (action === 'playState') {
                    updatePlayState(Boolean(value));
                } else if (action === 'speedState') {
                    speedDisplay.textContent = value.toFixed(1) + 'x';
                } else if (action === 'audioFiltersState') {
                    updateAudioFilters(value);
                } else if (action === 'backgroundState') {
                    updateBackgroundState(Boolean(value));
                } else if (action === 'completeState') {
                    updateCompleteState(Boolean(value));
                }
            }
        };

        const formatOption = (numero, titulo) => {
            return `${String(numero).padStart(3, '0')} - ${titulo}`;
        };

        const parseNumeroFromInput = (value) => {
            if (!value) return null;
            const match = value.trim().match(/^(\d{1,4})/);
            return match ? parseInt(match[1], 10) : null;
        };

        const populateHinoOptions = (list) => {
            hinoOptions.innerHTML = list.map(h => `<option value="${formatOption(h.numero, h.titulo)}"></option>`).join('');
        };

        const loadHinosIndex = async () => {
            try {
                const response = await fetch('data/hymns-index.json');
                if (!response.ok) throw new Error('Falha ao carregar lista');
                const data = await response.json();
                populateHinoOptions(data.slice(0, 400));
            } catch (error) {
                console.error('Erro ao carregar hinos para autocomplete:', error);
                hinoFeedback.textContent = 'Falha ao carregar lista de hinos.';
                hinoFeedback.classList.add('text-red-400');
            }
        };

        const submitHino = () => {
            const numero = parseNumeroFromInput(hinoInput.value);
            if (!numero || numero < 1) {
                hinoFeedback.textContent = 'Informe um número válido.';
                hinoFeedback.classList.replace('text-green-400', 'text-red-400');
                return;
            }
            send('selectHino', { numero });
            hinoFeedback.textContent = `Solicitando hino ${numero}...`;
            hinoFeedback.classList.remove('text-red-400');
            hinoFeedback.classList.add('text-green-400');
        };

        document.getElementById('remote-prev').onclick = () => send('prevSlide');
        document.getElementById('remote-next').onclick = () => send('nextSlide');
        document.getElementById('remote-scroll-up').onclick = () => send('scrollUp');
        document.getElementById('remote-scroll-down').onclick = () => send('scrollDown');
        document.getElementById('remote-home').onclick = () => send('scrollToTop');
        document.getElementById('remote-prev-hino').onclick = () => send('prevHino');
        document.getElementById('remote-next-hino').onclick = () => send('nextHino');
        document.getElementById('remote-random-hino').onclick = () => {
            send('stopAudio');
            updatePlayState(false);
            send('randomHino');
        };
        document.getElementById('remote-play').onclick = () => {
            send('togglePlay');
            updatePlayState(!isPlaying);
        };
        document.getElementById('remote-stop').onclick = () => {
            send('stopAudio');
            updatePlayState(false);
        };
        document.getElementById('remote-speed-down').onclick = () => send('speedDown');
        document.getElementById('remote-speed-up').onclick = () => send('speedUp');
        document.getElementById('remote-equalizer').onclick = () => {
            document.getElementById('remote-modal-audio-filters').classList.remove('hidden');
        };
        document.getElementById('remote-restart').onclick = () => send('restartAudio');
        document.getElementById('remote-fullscreen').onclick = () => send('toggleFullscreen');
        document.getElementById('remote-toggle-bg').onclick = () => {
            send('toggleBg');
            updateBackgroundState(!isBgActive);
        };
        document.getElementById('remote-toggle-complete').onclick = () => {
            send('toggleComplete');
            updateCompleteState(!isCompleteActive);
        };
        document.getElementById('remote-random-bg').onclick = () => send('shuffleBackground');
        document.getElementById('remote-random-playlist').onclick = () => {
            if (isPlaylistActive) {
                send('toggleRandomPlaylist');
                updatePlaylistState(false);
            } else {
                send('toggleRandomPlaylist');
                updatePlaylistState(true);
            }
        };
        document.getElementById('remote-select-hino').onclick = submitHino;
        hinoInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                submitHino();
            }
        });
        hinoInput.addEventListener('dblclick', () => {
            hinoInput.value = '';
            hinoFeedback.textContent = 'Campo limpo. Informe outro número.';
            hinoFeedback.classList.remove('text-red-400', 'text-green-400');
        });
        hinoClearBtn.addEventListener('click', () => {
            hinoInput.value = '';
            hinoFeedback.textContent = 'Seleção limpa. Informe outro número.';
            hinoFeedback.classList.remove('text-red-400');
            hinoFeedback.classList.remove('text-green-400');
        });

        // Solicitar estado inicial de fullscreen ao carregar
        send('requestFullscreenState');
        
        // Solicitar valores atuais dos filtros de áudio
        send('requestAudioFilters');
        
        // Solicitar estado do background
        send('requestBackgroundState');
        
        // Solicitar estado do completo
        send('requestCompleteState');
        
        // Setup real-time label updates for filter sliders
        document.getElementById('remote-range-gain').addEventListener('input', (e) => {
            document.getElementById('remote-label-gain').textContent = parseFloat(e.target.value).toFixed(1) + 'x';
        });
        document.getElementById('remote-range-bass').addEventListener('input', (e) => {
            document.getElementById('remote-label-bass').textContent = e.target.value + 'dB';
        });
        document.getElementById('remote-range-mid').addEventListener('input', (e) => {
            document.getElementById('remote-label-mid').textContent = e.target.value + 'dB';
        });
        document.getElementById('remote-range-treble').addEventListener('input', (e) => {
            document.getElementById('remote-label-treble').textContent = e.target.value + 'dB';
        });
        
        loadHinosIndex();
    </script>
