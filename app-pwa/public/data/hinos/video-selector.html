<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seletor de Vídeos - Hinário Adventista</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            background: #f5f5f5;
        }
        h1 { color: #333; margin-bottom: 10px; }
        .header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        .stats {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .stat {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            min-width: 120px;
        }
        .stat-number { font-size: 24px; font-weight: bold; color: #333; }
        .stat-label { font-size: 12px; color: #666; }
        .hino-card {
            background: white;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid #ddd;
        }
        .hino-card.has-videos { border-left-color: #28a745; }
        .hino-card.selected { border-left-color: #007bff; background: #f0f7ff; }
        .hino-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .hino-number {
            font-weight: bold;
            min-width: 40px;
            color: #666;
            font-size: 14px;
        }
        .hino-title {
            flex: 1;
            font-weight: 500;
            min-width: 200px;
        }
        .videos-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .video-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px;
            background: #f8f9fa;
            border-radius: 4px;
            flex-wrap: wrap;
        }
        .video-option label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            flex: 1;
        }
        .video-checkbox { width: 18px; height: 18px; }
        .video-title {
            flex: 1;
            font-size: 13px;
            color: #333;
            min-width: 200px;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .video-btn {
            padding: 5px 10px;
            background: #ff0000;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 11px;
        }
        .video-btn:hover { background: #cc0000; }
        .embed-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .embed-overlay.active { display: flex; }
        .embed-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 8px;
            max-width: 900px;
            width: 95%;
            position: relative;
        }
        .embed-close {
            position: absolute;
            top: -40px;
            right: 0;
            color: white;
            font-size: 30px;
            cursor: pointer;
            background: none;
            border: none;
            width: 40px;
            height: 40px;
        }
        .embed-box iframe {
            width: 100%;
            aspect-ratio: 16/9;
            border: none;
        }
        .embed-title {
            color: #aaa;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .checkbox-video {
            width: 18px;
            height: 18px;
        }
        .progress-info {
            margin-top: 10px;
            font-size: 13px;
            color: #666;
        }
        .results-preview {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }
        .results-preview.active { display: block; }
        .results-preview textarea {
            width: 100%;
            height: 300px;
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Seletor de Vídeos - Hinário Adventista</h1>
        <p>Selecione os vídeos do YouTube para cada hino. Cada hino pode ter até 3 vídeos.</p>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="totalHinos">196</div>
                <div class="stat-label">Total de Hinos</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="hinosComVideos">0</div>
                <div class="stat-label">Com Vídeos</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="videosSelecionados">0</div>
                <div class="stat-label">Vídeos Selecionados</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-primary" onclick="exportResults()">Exportar Selección</button>
            <button class="btn btn-success" onclick="confirmSelection()">Confirmar Tudo</button>
        </div>
        
        <div class="progress-info" id="progressInfo">Processando: 0 / 196</div>
    </div>
    
    <div id="hinosList"></div>
    
    <div class="results-preview" id="resultsPreview">
        <h2>Resultados - Copie e me Envie</h2>
        <textarea id="submissionData"></textarea>
        <br><br>
        <button class="btn btn-success" onclick="copyResults()">Copiar</button>
    </div>
    
    <div class="embed-overlay" id="embedOverlay">
        <div class="embed-box">
            <button class="embed-close" onclick="closeEmbed()">&times;</button>
            <div class="embed-title" id="embedTitle"></div>
            <iframe id="embedFrame" allowfullscreen></iframe>
        </div>
    </div>
    
    <script>
        // Dados dos hinos - será preenchido automaticamente
        let hinos = [];
        
        // Carregar hinos do índice
        async function loadHinos() {
            try {
                const response = await fetch('./hymns-index.json');
                const data = await response.json();
                hinos = data.map(h => ({
                    numero: h.numero,
                    titulo: h.titulo,
                    videos: []
                }));
                renderHinos();
            } catch(e) {
                console.error('Erro ao carregar:', e);
            }
        }
        
        function renderHinos() {
            const container = document.getElementById('hinosList');
            container.innerHTML = '';
            
            hinos.forEach((hino, index) => {
                const card = document.createElement('div');
                card.className = 'hino-card';
                card.id = `hino-${hino.numero}`;
                card.innerHTML = `
                    <div class="hino-header">
                        <span class="hino-number">${String(hino.numero).padStart(3, '0')}</span>
                        <span class="hino-title">${hino.titulo}</span>
                    </div>
                    <div class="videos-list" id="videos-${hino.numero}">
                        ${hino.videos.map((v, i) => renderVideoOption(hino.numero, v, i)).join('')}
                    </div>
                `;
                container.appendChild(card);
            });
            
            updateStats();
        }
        
        function renderVideoOption(numero, video, index) {
            return `
                <div class="video-option">
                    <input type="checkbox" class="video-checkbox" 
                           data-numero="${numero}" data-video="${index}"
                           ${video.selecionado ? 'checked' : ''}
                           onchange="toggleVideo(this)">
                    <span class="video-title">${video.titulo || 'Vídeo ' + (index + 1)}</span>
                    <a class="video-btn" href="#" onclick="playVideo('${video.id}', '${escape(video.titulo)}')">▶ Play</a>
                </div>
            `;
        }
        
        function escape(str) {
            return str ? str.replace(/'/g, "\\'") : '';
        }
        
        function playVideo(videoId, titulo) {
            const overlay = document.getElementById('embedOverlay');
            const frame = document.getElementById('embedFrame');
            const title = document.getElementById('embedTitle');
            
            frame.src = `https://www.youtube.com/embed/${videoId}`;
            title.textContent = titulo || videoId;
            overlay.classList.add('active');
        }
        
        function closeEmbed() {
            const overlay = document.getElementById('embedOverlay');
            const frame = document.getElementById('embedFrame');
            frame.src = '';
            overlay.classList.remove('active');
        }
        
        function toggleVideo(checkbox) {
            const numero = checkbox.dataset.numero;
            const index = parseInt(checkbox.dataset.video);
            const hino = hinos.find(h => h.numero == numero);
            if (hino && hino.videos[index]) {
                hino.videos[index].selecionado = checkbox.checked;
            }
            updateStats();
        }
        
        function updateStats() {
            const comVideos = hinos.filter(h => h.videos && h.videos.length > 0).length;
            const selecionados = hinos.reduce((acc, h) => {
                return acc + (h.videos ? h.videos.filter(v => v.selecionado).length : 0);
            }, 0);
            
            document.getElementById('hinosComVideos').textContent = comVideos;
            document.getElementById('videosSelecionados').textContent = selecionados;
            
            hinos.forEach(hino => {
                const card = document.getElementById(`hino-${hino.numero}`);
                if (hino.videos && hino.videos.length > 0) {
                    card.classList.add('has-videos');
                }
                if (hino.videos && hino.videos.some(v => v.selecionado)) {
                    card.classList.add('selected');
                } else {
                    card.classList.remove('selected');
                }
            });
        }
        
        function exportResults() {
            const resultados = [];
            hinos.forEach(hino => {
                if (hino.videos) {
                    hino.videos.forEach((v, i) => {
                        if (v.selecionado) {
                            resultados.push({
                                numero: hino.numero,
                                titulo: hino.titulo,
                                videoId: v.id,
                                videoTitulo: v.titulo
                            });
                        }
                    });
                }
            });
            
            const output = JSON.stringify(resultados, null, 2);
            document.getElementById('submissionData').value = output;
            document.getElementById('resultsPreview').classList.add('active');
        }
        
        function confirmSelection() {
            exportResults();
            alert('Pronto! Copie os resultados e me envie.');
        }
        
        function copyResults() {
            const textarea = document.getElementById('submissionData');
            textarea.select();
            document.execCommand('copy');
            alert('Copiado!');
        }
        
        // Função para adicionar vídeos - será chamada automaticamente
        function addVideo(numero, videoId, titulo) {
            const hino = hinos.find(h => h.numero == numero);
            if (hini && hino.videos) {
                // Limitar a 3 vídeos por hino
                if (hini.videos.length < 3) {
                    hino.videos.push({ id: videoId, titulo: titulo, selecionado: false });
                    // Atualizar visual
                    const videosList = document.getElementById(`videos-${numero}`);
                    if (videosList) {
                        videosList.innerHTML = hino.videos.map((v, i) => renderVideoOption(numero, v, i)).join('');
                    }
                    updateStats();
                }
            }
        }
        
        function setProgress(current, total, titulo) {
            document.getElementById('progressInfo').textContent = 
                `Processando: ${current} / ${total} - ${titulo}`;
        }
        
        // Iniciar
        loadHinos();
    </script>
</body>
</html>
